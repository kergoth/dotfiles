# Sources for the shared Git lock.
#   This is specifically *not* used to generate consumers directly. Templates and
#   scripts remain responsible for deciding how each pinned Git source is used.
#   The sole purpose of this file is to let the update script resolve and refresh
#   pinned refs in git-lock.yml.
git_sources:
  gh_pr_review:
    repo: https://github.com/agynio/gh-pr-review
    tagged: true
  gh_pr_review_skill:
    repo: https://github.com/kergoth/gh-pr-review
    ref: tighten-security-guardrails
    review_note: "Focus primarily on SKILL.md and any documentation or code changes that affect the advertised skill workflow or command interface. The released gh extension binary remains pinned separately via the tagged gh_pr_review entry; this source exists only to pin skill content."
  86box_assets:
    repo: https://github.com/86Box/assets
    ref: main
    review: false
  86box_roms:
    repo: https://github.com/86Box/roms
    ref: master
    review: false
  anthropic_official_plugins:
    repo: https://github.com/anthropics/claude-plugins-official
    review_note: "The only plugins I install from this marketplace are claude-md-management and skill-creator. State explicitly at the start whether either has code changes. Also review in full: shared infrastructure changes (marketplace.json format/schema, plugin-loading code) and supply-chain risks in marketplace.json (unpinned entries, source changes). For code changes inside other plugins' own files (e.g. telegram/, discord/, math-olympiad/), skip detailed analysis — note the plugin name and one-line summary only if it adds systemic risk."
  avoid_ai_writing:
    repo: https://github.com/conorbronsdon/avoid-ai-writing
    review_note: "I use this as the base layer for AI writing pattern detection. Focus on changes to SKILL.md: vocabulary tier changes (additions, removals, tier reassignments), context profile changes, structural pattern rules, and scoring thresholds. Flag any changes that might conflict with the clean-prose wrapper skill's overrides (em dash rules, technical vocabulary carve-outs)."
  astral:
    repo: https://github.com/astral-sh/claude-code-plugins
    review_note: "This package provides the ruff, ty, and uv agent skills that I actively use. Focus on changes to those three skills and any shared infrastructure. Flag changes that alter how linting, type checking, or package management is recommended or executed, or that add unexpected network calls or file system access."
  bat_extras:
    repo: https://github.com/eth-p/bat-extras
    tagged: true
  claude_code:
    #repo: https://github.com/anthropics/claude-code
    tagged: true
    tag_source: git_tags
    review_paths:
      - "CHANGELOG.md"
    review_note: "This repository is a release-tracking distribution repo for Claude Code.
      List each notable user-visible, installer, packaging, or security-relevant change
      from the CHANGELOG.md diff. Do not just say 'safe to apply' without listing them.
      If CHANGELOG.md did not change, flag the update for manual inspection."
  beanbaginc_dev_goodies:
    repo: https://github.com/beanbaginc/dev-goodies
    ref: master
  bitbake_syntax:
    repo: https://github.com/casparfriedrich/bitbake-syntax
    ref: master
    review: false
  devpod:
    repo: https://github.com/loft-sh/devpod
    tagged: true
  distrobox:
    repo: https://github.com/89luca89/distrobox
    tagged: true
  dracula_bbedit:
    repo: https://github.com/dracula/bbedit
    ref: master
    review: false
  dracula_zed:
    repo: https://github.com/dracula/zed
    review: false
  fumiyas_home_commands:
    repo: https://github.com/fumiyas/home-commands
    ref: master
    review_note: "Focus only on changes to the 'ifne' script, as it's the only one I use from this repository. Do NOT review changes to other files. Do NOT output anything if changes are solely to other files."
  fzf_tab:
    repo: https://github.com/Aloxaf/fzf-tab
    tagged: true
  gist_zsh_timing:
    repo: https://gist.github.com/2d7ef99f93b226be29e01cadcad37405
    ref: master
  gist_zbell:
    repo: https://gist.github.com/5278239
    ref: master
  git_assembler:
    repo: https://gitlab.com/wavexx/git-assembler
    ref: master
  git_extras:
    repo: https://github.com/tj/git-extras
    tagged: true
  korg_helpers:
    repo: https://git.kernel.org/pub/scm/linux/kernel/git/mricon/korg-helpers
    ref: master
  kitty:
    repo: https://github.com/kovidgoyal/kitty
    tagged: true
    review_note: "Focus on user-visible changes, installer behavior, packaging, and release integrity. Pay particular attention to changes affecting the official installer, published checksums or signatures, and Linux/macOS binary distribution."
  zed:
    repo: https://github.com/zed-industries/zed
    tagged: true
    review_note: "This lock now governs both the installed Zed application version and the versioned installer script fetched from the official repository. Review the release as a product update first: summarize user-visible features, fixes, Linux-specific changes, and any breaking changes or notices that could affect existing configuration or workflows. Then review installer and release-integrity concerns: changes to script/install.sh, downloaded asset URLs, platform/arch mapping, user-scope install paths, update behavior, and anything that changes the trust or packaging model."
  ia_fonts:
    repo: https://github.com/iaolo/iA-Fonts
    ref: master
    raw_base: https://raw.githubusercontent.com/iaolo/iA-Fonts
    review: false
  knu_zsh_git_escape_magic:
    repo: https://github.com/knu/zsh-git-escape-magic
    ref: master
  knu_zsh_manydots_magic:
    repo: https://github.com/knu/zsh-manydots-magic
    ref: master
  madx_moreutils:
    repo: https://github.com/madx/moreutils
    ref: master
  nix_zsh_completions:
    repo: https://github.com/nix-community/nix-zsh-completions
    tagged: true
  plasma_applet_commandoutput:
    repo: https://github.com/Zren/plasma-applet-commandoutput
    ref: master
  powerlevel10k:
    repo: https://github.com/romkatv/powerlevel10k
    tagged: true
  powerlevel10k_media:
    repo: https://github.com/romkatv/powerlevel10k-media
    ref: master
    raw_base: https://raw.githubusercontent.com/romkatv/powerlevel10k-media
    review: false
  vim_profiler:
    repo: https://github.com/bchretien/vim-profiler
    ref: master
  readwise_reader_desktop:
    repo: https://github.com/readwiseio/reader-desktop-releases
    tagged: true
  readwise_skills:
    repo: https://github.com/readwiseio/readwise-skills
    ref: main
    review_note: "I only use three skills from this package: quiz, reader-recap, and feed-catchup. Focus on changes to those three skill files only. Flag any instructions that could cause unintended data modification, deletions, or unauthorized access to the Readwise API beyond reading and tagging."
  retroarch:
    repo: https://github.com/libretro/RetroArch
    ref: master
    review: false
  steamtinkerlaunch:
    repo: https://github.com/sonic2kk/steamtinkerlaunch
    ref: master
  superpowers:
    repo: https://github.com/obra/superpowers
    review_note: "I use the full skill library from this package. Focus on: changes to existing skill content (especially using-superpowers, brainstorming, systematic-debugging, test-driven-development, writing-plans, and other core workflow skills), new skills added, and any skill instructions that could encourage unsafe or unauthorized actions or alter established tool-use patterns."
  wsl_open:
    repo: https://github.com/4U6U57/wsl-open
    ref: master
  zsh_autosuggestions:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    ref: master
  zsh_bd:
    repo: https://github.com/Tarrasch/zsh-bd
    ref: master
  zsh_completions:
    repo: https://github.com/zsh-users/zsh-completions
    tagged: true
  zsh_history_substring_search:
    repo: https://github.com/zsh-users/zsh-history-substring-search
    tagged: true
  zsh_nix_shell:
    repo: https://github.com/chisui/zsh-nix-shell
    tagged: true
  zsh_syntax_highlighting:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    ref: master
