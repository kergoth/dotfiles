# Sources for pinned externals.
#   This is specifically *not* used to template creation of externals, as that's
#   left to the user to ensure they can leverage template capabilities. The sole
#   purpose of this file is to allow the update script to update the pins.
externals_sources:
  86box_assets:
    repo: https://github.com/86Box/assets
    ref: main
    review: false
  86box_roms:
    repo: https://github.com/86Box/roms
    ref: master
    review: false
  anthropic_official_plugins:
    repo: https://github.com/anthropics/claude-plugins-official
