# Sources for pinned externals.
#   This is specifically *not* used to template creation of externals, as that's
#   left to the user to ensure they can leverage template capabilities. The sole
#   purpose of this file is to allow the update script to update the pins.
externals_sources:
  86box_assets:
    repo: https://github.com/86Box/assets
    ref: main
  86box_roms:
    repo: https://github.com/86Box/roms
    ref: master
  anthropic_official_plugins:
    repo: https://github.com/anthropics/claude-plugins-official
  astral:
    repo: https://github.com/astral-sh/claude-code-plugins
  beanbaginc_dev_goodies:
    repo: https://github.com/beanbaginc/dev-goodies
    ref: master
  bitbake_syntax:
    repo: https://github.com/casparfriedrich/bitbake-syntax
    ref: master
  dracula_bbedit:
    repo: https://github.com/dracula/bbedit
    ref: master
  dracula_zed:
    repo: https://github.com/dracula/zed
  fumiyas_home_commands:
    repo: https://github.com/fumiyas/home-commands
    ref: master
  knu_zsh_git_escape_magic:
    repo: https://github.com/knu/zsh-git-escape-magic
    ref: master
  knu_zsh_manydots_magic:
    repo: https://github.com/knu/zsh-manydots-magic
    ref: master
  madx_moreutils:
    repo: https://github.com/madx/moreutils
    ref: master
  retroarch:
    repo: https://github.com/libretro/RetroArch
    ref: master
  steamtinkerlaunch:
    repo: https://github.com/sonic2kk/steamtinkerlaunch
    ref: master
  superpowers:
    repo: https://github.com/obra/superpowers
  wsl_open:
    repo: https://github.com/4U6U57/wsl-open
    ref: master
  zsh_autosuggestions:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    ref: master
  zsh_bd:
    repo: https://github.com/Tarrasch/zsh-bd
    ref: master
  zsh_syntax_highlighting:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    ref: master
  zsh_windows_terminal_integration:
    repo: https://github.com/romkatv/windows-terminal-zsh-integration
    ref: master
